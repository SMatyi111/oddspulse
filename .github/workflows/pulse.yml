name: pulse

on:
  schedule:
    # Offset minutes: round slots (:00/:05/...) are GitHub's most congested and
    # get deprioritized/dropped on quiet repos — :03/:08/... fires far more reliably.
    - cron: "3-58/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: pulse
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Load state from state branch
        run: |
          git fetch origin state:refs/remotes/origin/state 2>/dev/null || true
          git show origin/state:state.json > state.json 2>/dev/null || echo '{}' > state.json

      - name: Run pulse
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ vars.TELEGRAM_CHANNEL }}
        run: node src/index.js

      - name: Save state to state branch
        run: |
          git config user.name "oddspulse-bot"
          git config user.email "actions@users.noreply.github.com"
          blob=$(git hash-object -w state.json)
          tree=$(printf '100644 blob %s\tstate.json\n' "$blob" | git mktree)
          commit=$(git commit-tree "$tree" -m "state $(date -u +%FT%TZ)")
          git push -f origin "$commit:refs/heads/state"
